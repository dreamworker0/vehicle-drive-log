name: Preview — PR 미리보기

on:
  pull_request:
    branches: [master]

jobs:
  preview:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node 22
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create .env file
        run: echo "${{ secrets.ENV_FILE }}" > .env

      - name: Build
        run: npm run build

      # 서드파티 액션(action-hosting-deploy)은 서비스계정을 전달받는 공급망 리스크가 있어
      # deploy.yml과 동일하게 firebase-tools CLI 직접 호출로 대체한다 (2026-06-26 보안 감사 F1).
      # 프리뷰 URL은 스텝 로그에 출력된다.
      - name: Deploy to Preview Channel
        if: github.actor != 'dependabot[bot]'
        run: |
          export GOOGLE_APPLICATION_CREDENTIALS=$(mktemp)
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > "$GOOGLE_APPLICATION_CREDENTIALS"
          npx firebase-tools hosting:channel:deploy "pr-${{ github.event.number }}" --expires 3d --project vehicle-drive-log
          rm -f "$GOOGLE_APPLICATION_CREDENTIALS"
