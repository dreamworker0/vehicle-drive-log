name: CI — 린트 · 테스트 · 빌드

on:
  push:
    branches: [master]
    # 문서·마크다운만 변경된 푸시는 CI(및 이어지는 Deploy)를 건너뛴다 — Actions 무료 분량 절약.
    # 1회 풀 사이클 ≈ 20분(CI ~16분 + Deploy ~4분)이라 문서 전용 푸시가 누적 비용의 주범이었다.
    # 코드와 섞인 푸시는 정상 실행되고, .md 전용 변경의 sync --check는 다음 코드 푸시에서 검증된다.
    paths-ignore:
      - 'docs/**'
      - '**.md'
  pull_request:
    branches: [master]

# 최소 권한 — CI는 코드 체크아웃만 필요하고 저장소에 쓰지 않는다.
permissions:
  contents: read

# 연속 푸시가 겹치면 낡은 CI를 취소한다 — 마지막 푸시만 검증·배포된다.
# (취소된 CI는 conclusion이 success가 아니므로 Deploy(workflow_run)로 이어지지 않아 안전)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 변경 경로 감지 — Functions 단위 테스트(~11분)는 관련 경로 변경 시에만 실행한다.
  # shared/**는 Functions에서도 소비(shared/faqData.ts → functions/src/utils/faqData.ts)하므로
  # 반드시 포함한다. 워크플로 자체 변경 시에는 안전하게 전체 실행.
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      functions: ${{ steps.filter.outputs.functions }}
    steps:
      - uses: actions/checkout@v5
      - name: 변경 경로 감지
        id: filter
        # 서드파티 액션은 커밋 SHA로 고정한다 — 태그는 이동 가능하므로 공급망 변조(태그 재지정) 방어.
        # 공식 actions/*는 GitHub 관리(+Dependabot)라 메이저 태그를 유지한다. (2026-07-18 보안 재점검 G)
        uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3.0.3
        with:
          filters: |
            functions:
              - 'functions/**'
              - 'shared/**'
              - '.github/workflows/ci.yml'

  # Functions 단위 테스트 + 커버리지 게이트 — 메인 ci 잡과 병렬 실행해 전체 체감 시간을 줄인다.
  # (한 잡에 직렬로 두면 CI 1회 ~19분 중 절반 이상이 이 테스트였다)
  functions-tests:
    needs: changes
    if: needs.changes.outputs.functions == 'true'
    runs-on: ubuntu-latest
    # 커버리지 계측이 실행 시간을 ~2배로 늘린다(로컬 8워커 4분 → CI 저워커 15분+). 전용 잡이
    # 러너를 독점하므로 워커를 3으로 올려 체감 시간을 줄이고, 변동 폭까지 흡수하도록 30분 여유를 둔다.
    timeout-minutes: 30
    env:
      TZ: "Asia/Seoul"
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node 22
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install functions dependencies
        run: cd functions && npm ci

      # --coverage로 functions/package.json jest 설정의 coverageThreshold를 게이트로 강제한다.
      # 워커 3개 × max-old-space 4GB = 최대 12GB로 러너(16GB) 이내. (전용 잡이라 다른 스텝과 메모리 비경합)
      - name: Functions unit tests (+coverage gate)
        run: cd functions && npx jest --coverage --testPathIgnorePatterns=emulator --maxWorkers=3 --workerIdleMemoryLimit=512MB
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Upload functions coverage summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: functions-coverage-summary
          path: functions/coverage/coverage-summary.json
          if-no-files-found: ignore
          retention-days: 14

  ci:
    runs-on: ubuntu-latest
    # 게이트 스텝(Rules·인증 E2E·커버리지) 추가로 첫 실행(캐시 미적중) 기준 ~20분 소요
    timeout-minutes: 25
    env:
      TZ: "Asia/Seoul"

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node 22
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install functions dependencies
        run: cd functions && npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Type check (functions)
        run: npm run type-check:functions

      - name: .agent ↔ .claude 동기화 검증
        run: npm run sync:agents -- --check

      - name: 하네스 Doctor (정합성 검사)
        run: npm run verify:harness

      - name: Create .env file
        run: echo "${{ secrets.ENV_FILE }}" > .env

      - name: Build
        run: npm run build

      # --coverage로 vitest.config.js의 커버리지 임계치를 실제 게이트로 강제한다
      - name: Unit tests (+coverage gate)
        run: npx vitest run --coverage

      - name: Upload coverage summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-summary
          path: coverage/coverage-summary.json
          if-no-files-found: ignore
          retention-days: 14

      # ── Firestore Rules 테스트 (멀티테넌트 격리의 유일한 자동 검증) ──
      # firebase-tools 15.x는 Java 21 미만을 지원하지 않는다 (17이면 에뮬레이터 기동 실패)
      - name: Setup Java (Firebase emulator)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Firebase emulators
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ runner.os }}

      - name: Security Rules tests (Firestore + Storage emulator)
        run: npx firebase-tools emulators:exec --only firestore,storage "npx vitest run --exclude='' tests/firestore-rules.test.ts tests/storage-rules.test.ts"

      # ── E2E ──
      - name: Get Playwright version
        id: pw-version
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw-version.outputs.version }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npx playwright test
        env:
          CI: true

      # 인증 E2E — 에뮬레이터(auth,firestore) 위에서 로그인·역할 리다이렉트·오프라인 동기화 검증
      - name: Authed E2E (emulator)
        run: npx firebase-tools emulators:exec --only auth,firestore "npx playwright test -c playwright.emulator.config.ts"
        env:
          CI: true

      - name: Bundle size check
        run: npx tsx scripts/check-bundle-size.ts

      - name: Security audit
        run: npm run audit

      # 실패 진단용 아티팩트 — E2E trace·screenshot·test-results. 성공 시에는 업로드하지 않는다.
      - name: Upload E2E failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-failure-artifacts
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
          retention-days: 7
