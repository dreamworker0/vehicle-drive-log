name: CI — 린트 · 테스트 · 빌드

on:
  push:
    branches: [master]
    # 문서·마크다운만 변경된 푸시는 CI(및 이어지는 Deploy)를 건너뛴다 — Actions 무료 분량 절약.
    # 1회 풀 사이클 ≈ 20분(CI ~16분 + Deploy ~4분)이라 문서 전용 푸시가 누적 비용의 주범이었다.
    # 코드와 섞인 푸시는 정상 실행되고, .md 전용 변경의 sync --check는 다음 코드 푸시에서 검증된다.
    paths-ignore:
      - 'docs/**'
      - '**.md'
  pull_request:
    branches: [master]

# 최소 권한 — CI는 코드 체크아웃만 필요하고 저장소에 쓰지 않는다.
permissions:
  contents: read

# 연속 푸시가 겹치면 낡은 CI를 취소한다 — 마지막 푸시만 검증·배포된다.
# (취소된 CI는 conclusion이 success가 아니므로 Deploy(workflow_run)로 이어지지 않아 안전)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    # 게이트 스텝(Rules·인증 E2E·커버리지) 추가로 첫 실행(캐시 미적중) 기준 ~20분 소요
    timeout-minutes: 25
    env:
      TZ: "Asia/Seoul"

    steps:
      - uses: actions/checkout@v5

      # 변경 경로 감지 — CI 1회 ~19분 중 Functions 단위 테스트가 ~11분(절반 이상)을 차지하므로,
      # functions/** 미변경 푸시(프론트 전용)에서는 해당 스텝을 건너뛰어 Actions 분량을 절감한다.
      # 워크플로 자체 변경 시에는 안전하게 전체 실행.
      - name: 변경 경로 감지
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            functions:
              - 'functions/**'
              - '.github/workflows/ci.yml'

      - name: Setup Node 22
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install functions dependencies
        run: cd functions && npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Type check (functions)
        run: npm run type-check:functions

      - name: .agent ↔ .claude 동기화 검증
        run: npm run sync:agents -- --check

      - name: Create .env file
        run: echo "${{ secrets.ENV_FILE }}" > .env

      - name: Build
        run: npm run build

      # --coverage로 vitest.config.js의 커버리지 임계치를 실제 게이트로 강제한다
      - name: Unit tests (+coverage gate)
        run: npx vitest run --coverage

      # functions/** 변경 시에만 실행 (프론트 전용 푸시에서 ~11분 절감)
      - name: Functions unit tests
        if: steps.changes.outputs.functions == 'true'
        run: cd functions && npm test -- --maxWorkers=2 --workerIdleMemoryLimit=512MB
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      # ── Firestore Rules 테스트 (멀티테넌트 격리의 유일한 자동 검증) ──
      # firebase-tools 15.x는 Java 21 미만을 지원하지 않는다 (17이면 에뮬레이터 기동 실패)
      - name: Setup Java (Firebase emulator)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Firebase emulators
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ runner.os }}

      - name: Firestore Rules tests (emulator)
        run: npx firebase-tools emulators:exec --only firestore "npx vitest run --exclude='' tests/firestore-rules.test.ts"

      # ── E2E ──
      - name: Get Playwright version
        id: pw-version
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw-version.outputs.version }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npx playwright test
        env:
          CI: true

      # 인증 E2E — 에뮬레이터(auth,firestore) 위에서 로그인·역할 리다이렉트·오프라인 동기화 검증
      - name: Authed E2E (emulator)
        run: npx firebase-tools emulators:exec --only auth,firestore "npx playwright test -c playwright.emulator.config.ts"
        env:
          CI: true

      - name: Bundle size check
        run: npx tsx scripts/check-bundle-size.ts

      - name: Security audit
        run: npm run audit
