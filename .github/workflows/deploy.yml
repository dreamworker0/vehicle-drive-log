name: Deploy — 프로덕션 배포

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TZ: "Asia/Seoul"

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node 22
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install functions dependencies
        run: cd functions && npm ci --legacy-peer-deps

      - name: Create .env files
        run: |
          echo "${{ secrets.ENV_FILE }}" > .env
          echo "${{ secrets.FUNCTIONS_ENV_FILE }}" > functions/.env

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npx vitest run

      - name: Security audit
        run: npm run audit

      - name: Deploy Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: vehicle-drive-log

      - name: Deploy Functions & Rules
        run: |
          export GOOGLE_APPLICATION_CREDENTIALS=$(mktemp)
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > $GOOGLE_APPLICATION_CREDENTIALS
          npx firebase-tools deploy --only functions,firestore:rules --force --project vehicle-drive-log
          rm -f "$GOOGLE_APPLICATION_CREDENTIALS"
