name: Deploy — 프로덕션 배포

on:
  push:
    branches: [master]
  workflow_dispatch:

# 동시 배포 방지: 여러 푸시가 겹쳐도 한 번에 하나만 실행하고 나머지는 대기시킨다.
# (동일 Cloud Function을 동시에 업데이트하면 409 "unable to queue the operation"으로
#  일부 함수 갱신이 조용히 누락된다. cancel-in-progress:false로 진행 중 배포는 끝까지 보장.)
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TZ: "Asia/Seoul"

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node 22
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install functions dependencies
        run: cd functions && npm ci --legacy-peer-deps

      - name: Create .env files
        run: |
          echo "${{ secrets.ENV_FILE }}" > .env
          echo "${{ secrets.FUNCTIONS_ENV_FILE }}" > functions/.env

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npx vitest run

      - name: Security audit
        run: npm run audit

      # 함수/규칙을 Hosting보다 먼저 배포한다.
      # (Hosting 릴리즈가 불안정 네트워크로 오탐 실패해도 핵심 백엔드 변경은 항상 반영되도록)
      - name: Deploy Functions & Rules
        run: |
          export GOOGLE_APPLICATION_CREDENTIALS=$(mktemp)
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > "$GOOGLE_APPLICATION_CREDENTIALS"
          npx firebase-tools deploy --only functions,firestore:rules --force --project vehicle-drive-log
          rm -f "$GOOGLE_APPLICATION_CREDENTIALS"

      # Hosting은 firebase-tools CLI로 직접 배포한다.
      # action-hosting-deploy는 실패 시 --debug로 재시도하며 functions/.env 시크릿을
      # 로그에 평문 출력하는 문제가 있어 사용하지 않는다. (--debug 미사용 = 누출 없음)
      - name: Deploy Hosting
        run: |
          export GOOGLE_APPLICATION_CREDENTIALS=$(mktemp)
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > "$GOOGLE_APPLICATION_CREDENTIALS"
          set +e
          OUT=$(npx firebase-tools deploy --only hosting --force --project vehicle-drive-log 2>&1)
          CODE=$?
          echo "$OUT"
          rm -f "$GOOGLE_APPLICATION_CREDENTIALS"
          # 불안정 네트워크로 릴리즈 POST를 재시도할 때 첫 호출이 이미 성공해
          # "is the current active version" 400이 나는 알려진 오탐은 성공으로 간주한다.
          if [ $CODE -ne 0 ] && echo "$OUT" | grep -q "is the current active version"; then
            echo "::warning::Hosting 릴리즈가 'current active version' 응답 — 이미 라이브 반영됨으로 간주하고 통과 처리"
            exit 0
          fi
          exit $CODE
