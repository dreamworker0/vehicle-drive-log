      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Car body -->
  <path d="M130 310 L155 240 C160 225 175 210 200 210 L312 210 C337 210 352 225 357 240 L382 310" 
