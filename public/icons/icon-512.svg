  <!-- Windows -->
  <path d="M175 250 L190 220 C192 216 198 213 205 213 L248 213 L248 250 Z" fill="rgba(59,130,246,0.6)"/>
  <path d="M264 250 L264 213 L307 213 C314 213 320 216 322 220 L337 250 Z" fill="rgba(59,130,246,0.6)"/>
  <!-- Wheels -->
  <circle cx="190" cy="345" r="32" fill="#1e40af"/>
  <circle cx="190" cy="345" r="18" fill="white"/>
  <circle cx="190" cy="345" r="8" fill="#1e40af"/>
  <circle cx="322" cy="345" r="32" fill="#1e40af"/>
  <circle cx="322" cy="345" r="18" fill="white"/>
  <circle cx="322" cy="345" r="8" fill="#1e40af"/>
  <!-- Headlights -->
  <rect x="100" y="308" width="20" height="14" rx="4" fill="#fbbf24"/>
  <rect x="392" y="308" width="20" height="14" rx="4" fill="#ef4444"/>
  <!-- Notepad icon (small) -->
  <rect x="326" y="100" width="80" height="100" rx="10" fill="white" opacity="0.9"/>
  <line x1="346" y1="125" x2="386" y2="125" stroke="#3b82f6" stroke-width="4" stroke-linecap="round"/>
  <line x1="346" y1="145" x2="380" y2="145" stroke="#93c5fd" stroke-width="4" stroke-linecap="round"/>
  <line x1="346" y1="165" x2="374" y2="165" stroke="#93c5fd" stroke-width="4" stroke-linecap="round"/>
</svg>
